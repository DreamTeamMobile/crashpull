name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    # TODO: Switch to npm trusted publishing (provenance) once supported
    # by this org. See: https://docs.npmjs.com/generating-provenance-statements
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2

      - run: npm ci
      - run: npm run build

      - name: Verify shebang in dist/bin.js
        run: head -1 dist/bin.js | grep -q '^#!/usr/bin/env node'

      - run: npm run lint
      - run: bun test
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
